<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>텍스트 저장, 불러오기 및 미리보기 앱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif; /* 기본 폰트 설정 */
        }
        /* 사용자 정의 버튼 스타일 */
        .custom-button {
            transition: background-color 0.3s ease, transform 0.1s ease, filter 0.3s ease; /* 부드러운 전환 효과 */
        }
        .custom-button:hover {
            filter: brightness(110%); /* 호버 시 약간 밝게 */
        }
        .custom-button:active {
            transform: scale(0.98); /* 클릭 시 약간 작아지는 효과 */
        }
        /* 메시지 박스 스타일 */
        .message-box {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(20px); /* 초기 위치 아래로 */
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 0.875rem;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out;
            visibility: hidden;
        }
        .message-box.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0); /* 위로 올라오며 나타남 */
        }
        .message-box.success {
            background-color: #28a745; /* Tailwind green-500 */
            color: white;
        }
        .message-box.error {
            background-color: #dc3545; /* Tailwind red-500 */
            color: white;
        }

        /* --- 레이아웃 및 텍스트 영역 스타일 조정 --- */

        /* 전체 앱 컨테이너 높이 제한 */
        .main-container {
           min-height: 70vh; /* Set min-height */
           max-height: calc(100vh - 7rem); /* Set max-height to be near full screen with a 7rem buffer */
           /* height property remains removed to allow dynamic height based on content within min/max bounds */
           display: flex;
           flex-direction: column;
           overflow-y: auto; /* Enable vertical scrolling for the container if content exceeds max-height */
        }

        /* 메인 콘텐츠 영역 */
        main {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            overflow: hidden;
            min-height: 0;
        }

        /* 텍스트 영역 래퍼 */
        .textarea-wrapper {
            display: flex;
            flex-direction: column;
            /* flex-grow: 1; removed */
            /* overflow: hidden; removed */
            min-height: 0; /* Ensure it can shrink/grow properly in flex column */
        }

        /* 텍스트 영역 스타일 */
        #textInput {
            /* height: 100%; removed */
            overflow-y: auto; /* Maintain vertical scrolling */
            overflow-x: auto; /* Enable horizontal scrolling */
            width: 100%;
            resize: none;
            white-space: pre; /* Prevent line wrapping */
            /* Tailwind class p-4 sets padding: 1rem; */
            /* Tailwind class bg-slate-700 sets background */
            /* Tailwind class text-slate-200 sets color */
            /* Font is inherited from body: 'Inter', sans-serif */
            /* Default browser line-height for textarea is often around 1.2 or 1.3, adjust if needed */
        }

        /* --- 라인 넘버 스타일 --- */
        #lineNumberContainer {
            width: 40px;
            background-color: #1e293b; /* slate-800 */
            color: #94a3b8; /* slate-400 */
            padding: 1rem 0.5rem; /* Match textarea top padding (1rem), add right padding for numbers */
            text-align: right;
            overflow: hidden;
            font-family: 'Inter', sans-serif; /* Match textarea */
            font-size: 1em; /* Match textarea, 1em usually refers to parent's font-size which should be default here*/
            line-height: 1.5; /* CRUCIAL: Adjust to match textarea. Tailwind's default leading-relaxed is 1.625, normal is 1.5 */
            user-select: none;
        }

        .line-number {
            display: block;
            white-space: nowrap;
            /* font-family, font-size, line-height are inherited from #lineNumberContainer */
        }

        /* --- 미리보기 모달 스타일 --- */
        .preview-modal {
            position: fixed;
            inset: 0; /* 화면 전체 채우기 */
            background-color: rgba(0, 0, 0, 0.7); /* 반투명 배경 */
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 2rem; /* 모달 내부 여백 */
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .preview-modal.show {
            opacity: 1;
            visibility: visible;
        }
        .preview-content {
            background-color: #1e293b; /* slate-800 */
            border-radius: 0.75rem; /* rounded-xl */
            padding: 1.5rem; /* p-6 */
            width: 90%;
            height: 90%;
            max-width: 1200px; /* 최대 너비 */
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); /* shadow-2xl */
        }
        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem; /* mb-4 */
            flex-shrink: 0; /* 헤더 크기 고정 */
        }
        .preview-title {
            font-size: 1.25rem; /* text-xl */
            font-weight: 600; /* font-semibold */
            color: #cbd5e1; /* slate-300 */
        }
        .preview-close-button {
            background: none;
            border: none;
            color: #94a3b8; /* slate-400 */
            font-size: 1.5rem; /* text-2xl */
            cursor: pointer;
            padding: 0.5rem;
            line-height: 1;
            transition: color 0.2s ease;
        }
        .preview-close-button:hover {
            color: #e2e8f0; /* slate-200 */
        }
        .preview-iframe-container {
            flex-grow: 1; /* 남은 공간 차지 */
            overflow: hidden; /* 내부 iframe 스크롤 관리 */
            background-color: #ffffff; /* iframe 배경 흰색 */
            border-radius: 0.5rem; /* rounded-lg */
        }
        #previewIframe {
            width: 100%;
            height: 100%;
            border: none;
        }

    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 to-slate-800 text-slate-100 flex flex-col items-center justify-center min-h-screen p-4 selection:bg-sky-500 selection:text-white">

    <div class="main-container bg-slate-800 shadow-2xl rounded-xl p-6 md:p-10 w-full">
        <header class="mb-8 text-center flex-shrink-0">
            <h1 class="text-3xl md:text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-sky-400 to-cyan-300">HTML편집기</h1>
            <p class="text-slate-400 mt-2 text-sm md:text-base">텍스트를 편집하고 .txt 또는 .html 파일로 저장, 불러오기, 미리보기를 해보세요.</p>
        </header>

        <main>
            <div class="textarea-wrapper">
                <label for="textInput" class="block mb-2 text-sm font-medium text-sky-300 flex-shrink-0">내용:</label>
                <div style="display: flex; overflow: visible; align-items: flex-start;">
                    <div id="lineNumberContainer"></div>
                    <textarea id="textInput" class="w-full p-4 bg-slate-600 border-2 border-slate-500 rounded-lg text-slate-200 focus:ring-2 focus:ring-sky-500 focus:border-sky-500 placeholder-slate-500 transition-shadow duration-300 shadow-inner" placeholder="여기에 텍스트를 입력하거나 파일을 불러오세요..." rows="20"></textarea>
                </div>
            </div>

            <input type="file" id="fileInput" accept=".txt,.html" style="display: none;">

            <div class="grid grid-cols-1 sm:grid-cols-4 gap-4 flex-shrink-0">
                 <button id="loadFileButton" class="custom-button bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 px-3 rounded-lg shadow-md focus:outline-none focus:ring-2 focus:ring-purple-500 focus:ring-opacity-50 text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="inline-block mr-1"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    불러오기
                </button>
                <button id="saveTxtButton" class="custom-button bg-sky-600 hover:bg-sky-700 text-white font-semibold py-3 px-3 rounded-lg shadow-md focus:outline-none focus:ring-2 focus:ring-sky-500 focus:ring-opacity-50 text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="inline-block mr-1"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    TXT 저장
                </button>
                <button id="saveHtmlButton" class="custom-button bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 px-3 rounded-lg shadow-md focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-opacity-50 text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="inline-block mr-1"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
                    HTML 저장
                </button>
                 <button id="previewButton" class="custom-button bg-yellow-500 hover:bg-yellow-600 text-slate-900 font-semibold py-3 px-3 rounded-lg shadow-md focus:outline-none focus:ring-2 focus:ring-yellow-500 focus:ring-opacity-50 text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="inline-block mr-1"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    미리보기
                </button>
            </div>
        </main>
    </div>

    <div id="messageBox" class="message-box"></div>

    <div id="previewModal" class="preview-modal">
        <div class="preview-content">
            <div class="preview-header">
                <h2 class="preview-title">HTML 미리보기</h2>
                <button id="closePreviewButton" class="preview-close-button" aria-label="미리보기 닫기">&times;</button>
            </div>
            <div class="preview-iframe-container">
                <iframe id="previewIframe" title="HTML Preview"></iframe>
            </div>
        </div>
    </div>

    <script>
        // DOM 요소 가져오기
        const textInput = document.getElementById('textInput');
        const saveTxtButton = document.getElementById('saveTxtButton');
        const saveHtmlButton = document.getElementById('saveHtmlButton');
        const loadFileButton = document.getElementById('loadFileButton');
        const fileInput = document.getElementById('fileInput');
        const messageBox = document.getElementById('messageBox');
        const previewButton = document.getElementById('previewButton'); // 미리보기 버튼
        const previewModal = document.getElementById('previewModal'); // 미리보기 모달
        const closePreviewButton = document.getElementById('closePreviewButton'); // 모달 닫기 버튼
        const previewIframe = document.getElementById('previewIframe'); // 미리보기 iframe
        const lineNumberContainer = document.getElementById('lineNumberContainer'); // 라인 넘버 컨테이너
        let messageTimeout;

        // --- 라인 넘버 기능 ---
        function updateLineNumbers() {
            if (!textInput || !lineNumberContainer) return; // 요소가 없으면 중단

            const lines = textInput.value.split('\n');
            const numberOfLines = lines.length;
            
            // 최적화를 위해 DocumentFragment 사용
            const fragment = document.createDocumentFragment();

            for (let i = 1; i <= numberOfLines; i++) {
                const lineNumberDiv = document.createElement('div');
                lineNumberDiv.textContent = i;
                lineNumberDiv.className = 'line-number'; // 스타일링을 위한 클래스 추가
                fragment.appendChild(lineNumberDiv);
            }
            
            // 기존 내용을 한 번에 교체 (innerHTML 보다 효율적일 수 있음)
            lineNumberContainer.innerHTML = ''; 
            lineNumberContainer.appendChild(fragment);
            
            // 스크롤 동기화
            lineNumberContainer.scrollTop = textInput.scrollTop;
        }

        // --- 자동 높이 조절 함수 ---
        function autoGrowTextarea(element) {
            if (!element) return;
            element.style.height = 'auto'; // Reset height to correctly calculate scrollHeight
            element.style.height = element.scrollHeight + 'px';
        }

        // --- 이벤트 리스너 ---
        // function setInitialHeight() { // This function is no longer used due to CSS changes and autoGrowTextarea
        // }
        // window.addEventListener('load', setInitialHeight); // This is no longer used

        // --- 이벤트 리스너 (라인 넘버 및 자동 높이 조절) ---
        if (textInput && lineNumberContainer) {
            textInput.addEventListener('input', () => {
                autoGrowTextarea(textInput); // Grow textarea first
                updateLineNumbers();      // Then update line numbers
            });
            textInput.addEventListener('scroll', () => {
                lineNumberContainer.scrollTop = textInput.scrollTop;
            });
            textInput.addEventListener('keydown', (e) => {
                // Enter 또는 Backspace/Delete 키 입력 시 즉시 업데이트
                // For these keys, autoGrow might need a slight delay if scrollHeight isn't updated immediately
                if (e.key === 'Enter' || e.key === 'Backspace' || e.key === 'Delete') {
                    requestAnimationFrame(() => {
                        autoGrowTextarea(textInput);
                        updateLineNumbers();
                    });
                }
            });
            
            // 초기 로드 시 라인 넘버 및 높이 업데이트
            autoGrowTextarea(textInput); // Set initial height based on content/rows
            updateLineNumbers();     // Then update line numbers
        }
        
        // 파일 로드 후 라인 넘버 업데이트 (기존 코드에 추가)
        // reader.onload 내 setInitialHeight() 호출을 updateLineNumbers()로 변경하거나 추가
        // setInitialHeight(); -> updateLineNumbers();


        // 메시지 표시 함수
        function showMessage(message, type = 'success') {
            messageBox.textContent = message;
            messageBox.className = `message-box ${type} show`;
            if (messageTimeout) clearTimeout(messageTimeout);
            messageTimeout = setTimeout(() => {
                messageBox.classList.remove('show');
                setTimeout(() => {
                     if (!messageBox.classList.contains('show')) {
                         messageBox.style.visibility = 'hidden';
                     }
                }, 500);
            }, 3000);
            messageBox.style.visibility = 'visible';
        }

        // 파일 다운로드 함수
        function downloadFile(filename, content, mimeType) {
            if (!content.trim()) {
                showMessage('저장할 내용이 없습니다.', 'error');
                return;
            }
            const userFilename = prompt("파일 이름을 입력하세요 (확장자 제외):", filename.split('.')[0]);
            if (userFilename === null || userFilename.trim() === "") {
                showMessage('파일 저장이 취소되었습니다.', 'error');
                return;
            }
            const finalFilename = userFilename.trim() + '.' + filename.split('.')[1];
            const element = document.createElement('a');
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            element.setAttribute('href', url);
            element.setAttribute('download', finalFilename);
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
            URL.revokeObjectURL(url);
            showMessage(`'${finalFilename}' 파일이 성공적으로 저장되었습니다!`);
        }

        // TXT 저장 버튼
        saveTxtButton.addEventListener('click', () => {
            downloadFile('document.txt', textInput.value, 'text/plain;charset=utf-8');
        });

        // HTML 저장 버튼
        saveHtmlButton.addEventListener('click', () => {
            downloadFile('document.html', textInput.value, 'text/html;charset=utf-8');
        });

        // 파일 불러오기 버튼
        loadFileButton.addEventListener('click', () => {
            fileInput.click();
        });

        // 파일 입력 변경
        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                textInput.value = e.target.result;
                showMessage(`'${file.name}' 파일을 성공적으로 불러왔습니다.`);
                updateLineNumbers();      // Update line numbers first
                autoGrowTextarea(textInput); // Then adjust height for new content
                event.target.value = null;
            };
            reader.onerror = (e) => {
                console.error("File reading error:", e);
                showMessage('파일을 읽는 중 오류가 발생했습니다.', 'error');
                event.target.value = null;
            };
            if (file.type === 'text/plain' || file.type === 'text/html') {
                reader.readAsText(file, 'UTF-8');
            } else {
                showMessage('지원하지 않는 파일 형식입니다 (.txt 또는 .html만 가능).', 'error');
                event.target.value = null;
            }
        });

        // --- 미리보기 기능 ---
        // 미리보기 버튼 클릭
        previewButton.addEventListener('click', () => {
            const htmlContent = textInput.value;
            if (!htmlContent.trim()) {
                showMessage('미리보기할 내용이 없습니다.', 'error');
                return;
            }
            // iframe의 srcdoc 속성에 HTML 내용 설정
            previewIframe.srcdoc = htmlContent;
            previewModal.classList.add('show'); // 모달 보이기
        });

        // 미리보기 닫기 버튼 클릭
        closePreviewButton.addEventListener('click', () => {
            previewModal.classList.remove('show'); // 모달 숨기기
            previewIframe.srcdoc = ''; // iframe 내용 비우기 (선택 사항)
        });

        // 모달 배경 클릭 시 닫기 (선택 사항)
        previewModal.addEventListener('click', (event) => {
            // 클릭된 요소가 모달 배경 자체인지 확인 (내부 콘텐츠 제외)
            if (event.target === previewModal) {
                previewModal.classList.remove('show');
                previewIframe.srcdoc = ''; // iframe 내용 비우기 (선택 사항)
            }
        });

    </script>
</body>
</html>
